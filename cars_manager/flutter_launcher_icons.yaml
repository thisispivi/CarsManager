flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: 'assets/icons/CarsManagerLogo.png'
  min_sdk_android: 21

  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: 'assets/icons/CarsManagerLogoTransparent.png'

  web:
    generate: true
    image_path: 'assets/icons/CarsManagerLogo.png'
    background_color: '#0F1114'
    theme_color: '#004B9F'

  windows:
    generate: false

  macos:
    generate: false
