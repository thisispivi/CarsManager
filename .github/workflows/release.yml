name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: cars_manager
        run: flutter pub get

      - name: Run tests
        working-directory: cars_manager
        run: flutter test

      - name: Build APK (split per ABI)
        working-directory: cars_manager
        run: flutter build apk --release --split-per-abi

      - name: Build Web
        working-directory: cars_manager
        run: flutter build web --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cars_manager/build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          body: |
            ## Cars Manager ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Android (arm64-v8a) | `app-arm64-v8a-release.apk` |
            | Android (armeabi-v7a) | `app-armeabi-v7a-release.apk` |
            | Android (x86_64) | `app-x86_64-release.apk` |
            | Web | Deployed to [GitHub Pages](https://thisispivi.github.io/CarsManager/) |

      - name: Upload web artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: web-release-${{ github.ref_name }}
          path: cars_manager/build/web/
          retention-days: 1

